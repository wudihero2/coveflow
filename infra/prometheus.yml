global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: coveflow-api
    static_configs:
      - targets: ["host.docker.internal:9091"]
        labels:
          component: api

  - job_name: coveflow-worker
    static_configs:
      - targets: ["host.docker.internal:9092"]
        labels:
          component: worker
          worker: "worker-a"
